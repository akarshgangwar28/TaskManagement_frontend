<div class="space-y-6">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <h2 class="text-2xl font-bold text-slate-800 tracking-tight">My Tasks</h2>
    <div class="flex items-center space-x-3">
      <!-- Filter -->
      <div class="bg-slate-100 p-1 rounded-lg flex space-x-1 shadow-inner border border-slate-200/50">
        <button (click)="setFilter('all')"
          [ngClass]="filterStatus() === 'all' ? 'bg-white shadow text-slate-800 font-semibold' : 'text-slate-600 hover:text-slate-800'"
          class="px-4 py-1.5 rounded-md text-sm transition-all focus:outline-none">All</button>
        <button (click)="setFilter(TaskStatus.Pending)"
          [ngClass]="filterStatus() === TaskStatus.Pending ? 'bg-white shadow text-slate-800 font-semibold' : 'text-slate-600 hover:text-slate-800'"
          class="px-4 py-1.5 rounded-md text-sm transition-all focus:outline-none">Pending</button>
        <button (click)="setFilter(TaskStatus.Completed)"
          [ngClass]="filterStatus() === TaskStatus.Completed ? 'bg-white shadow text-slate-800 font-semibold' : 'text-slate-600 hover:text-slate-800'"
          class="px-4 py-1.5 rounded-md text-sm transition-all focus:outline-none">Completed</button>
      </div>
      <!-- Add Button -->
      <button *ngIf="!isFormVisible()" (click)="showCreateForm()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow-md transition-all active:scale-95 flex items-center gap-1.5 border border-transparent">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        New Task
      </button>
    </div>
  </div>

  <!-- Form Area -->
  <div *ngIf="isFormVisible()" class="transition-all duration-300 ease-in-out mb-8">
    <app-task-form 
      [task]="editingTask()" 
      (save)="onSave($event)" 
      (cancel)="hideForm()">
    </app-task-form>
  </div>

  <!-- Task List -->
  <div class="grid gap-5 md:grid-cols-2 xl:grid-cols-3">
    <div *ngFor="let task of filteredTasks()" class="bg-white rounded-xl p-5 border border-slate-200/80 shadow-sm hover:shadow-md hover:border-indigo-200 transition-all duration-300 relative group flex flex-col transform hover:-translate-y-1">
      <!-- Status Badge & Hover Tools -->
      <div class="flex justify-between items-start mb-4 border-b border-slate-100 pb-3">
        <span [ngClass]="{
          'bg-amber-100 text-amber-800 border-amber-200 shadow-amber-100/50': task.status === 'pending',
          'bg-emerald-100 text-emerald-800 border-emerald-200 shadow-emerald-100/50': task.status === 'completed'
        }" class="px-3 py-1 text-[11px] uppercase tracking-wider font-bold rounded-full border shadow-sm">
          {{ task.status }}
        </span>
        <div class="flex space-x-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity">
          <!-- Edit -->
          <button (click)="showEditForm(task)" class="p-1.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 hover:shadow-sm rounded-md transition-all" title="Edit task">
             <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572V3z" /></svg>
          </button>
          <!-- Delete -->
          <button (click)="onDelete(task.id)" class="p-1.5 text-slate-400 hover:text-red-600 hover:bg-red-50 hover:shadow-sm rounded-md transition-all" title="Delete task">
            <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
          </button>
        </div>
      </div>
      
      <!-- Content -->
      <h3 class="font-bold text-slate-800 text-lg mb-2 line-clamp-1" [ngClass]="{'line-through text-slate-400 opacity-80': task.status === 'completed'}">{{ task.title }}</h3>
      <p class="text-sm text-slate-600 flex-1 relative" [ngClass]="{'opacity-70': task.status === 'completed'}">
        <span class="line-clamp-3">{{ task.description }}</span>
      </p>
      
      <!-- Footer / Actions -->
      <div class="mt-5 pt-4 border-t border-slate-100 flex items-center justify-between">
        <span class="text-[11px] font-medium text-slate-400 flex items-center gap-1.5 uppercase tracking-wider">
          <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
          {{ task.createdAt | date:'MMM d, y' }}
        </span>
        <button (click)="toggleStatus(task)" class="text-xs font-semibold px-2 py-1 rounded transition-colors" [ngClass]="task.status === 'pending' ? 'text-emerald-600 hover:bg-emerald-50' : 'text-amber-600 hover:bg-amber-50'">
          {{ task.status === 'pending' ? 'Mark Completed' : 'Make Pending' }}
        </button>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="filteredTasks().length === 0" class="col-span-full py-16 px-4 flex flex-col items-center justify-center text-center bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl">
      <div class="bg-indigo-50 border border-indigo-100 text-indigo-500 p-4 rounded-full mb-5 shadow-sm">
        <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
        </svg>
      </div>
      <h3 class="text-xl font-bold text-slate-800 mb-2">No tasks found</h3>
      <p class="text-slate-500 text-sm max-w-md">
        {{ filterStatus() === 'all' ? "You don't have any tasks right now. Create a new task to get started on your projects." : "No tasks match your current filter criteria." }}
      </p>
      <button *ngIf="!isFormVisible() && filterStatus() === 'all'" (click)="showCreateForm()" class="mt-6 bg-white border border-slate-200 hover:bg-slate-50 hover:border-slate-300 text-slate-700 px-5 py-2.5 rounded-lg text-sm font-semibold shadow-sm transition-all focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
        Create Your First Task
      </button>
    </div>
  </div>
</div>
